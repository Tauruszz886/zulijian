<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="-18 -20 196 140">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .frame { fill: none; stroke: #111827; stroke-width: 1.2; }
      .platform { fill: #4f8fb8; stroke: #164e63; stroke-width: 0.65; }
      .sphere { fill: #ef4444; fill-opacity: 0.82; stroke: #7f1d1d; stroke-width: 0.45; }
      .gap { fill: #e5e7eb; opacity: 0.55; }
      .grid { stroke: #d1d5db; stroke-width: 0.18; }
      .axis { stroke: #6b7280; stroke-width: 0.45; marker-end: url(#arrow); }
      .label { font-family: Arial, sans-serif; font-size: 4px; fill: #111827; }
      .small { font-family: Arial, sans-serif; font-size: 3.1px; fill: #374151; }
      .title { font-family: Arial, sans-serif; font-size: 5.4px; font-weight: 700; fill: #111827; }
      .note { font-family: Arial, sans-serif; font-size: 3.4px; fill: #7c2d12; }
      .dim { stroke: #7c2d12; stroke-width: 0.35; stroke-dasharray: 1.2 1.2; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect class="bg" x="-18" y="-20" width="196" height="140"/>
  <text class="title" x="0" y="-13">Level 02 new DXF top view - build solids only</text>
  <text class="small" x="0" y="-7">Frame: X 160, Z 100.  Actual 3DSOLID platforms are filled blue.  Coordinates are local startX/startZ.</text>

  <g id="grid">
    <line class="grid" x1="0" y1="0" x2="0" y2="100"/>
    <line class="grid" x1="20" y1="0" x2="20" y2="100"/>
    <line class="grid" x1="40" y1="0" x2="40" y2="100"/>
    <line class="grid" x1="60" y1="0" x2="60" y2="100"/>
    <line class="grid" x1="80" y1="0" x2="80" y2="100"/>
    <line class="grid" x1="100" y1="0" x2="100" y2="100"/>
    <line class="grid" x1="120" y1="0" x2="120" y2="100"/>
    <line class="grid" x1="140" y1="0" x2="140" y2="100"/>
    <line class="grid" x1="160" y1="0" x2="160" y2="100"/>

    <line class="grid" x1="0" y1="0" x2="160" y2="0"/>
    <line class="grid" x1="0" y1="20" x2="160" y2="20"/>
    <line class="grid" x1="0" y1="40" x2="160" y2="40"/>
    <line class="grid" x1="0" y1="60" x2="160" y2="60"/>
    <line class="grid" x1="0" y1="80" x2="160" y2="80"/>
    <line class="grid" x1="0" y1="100" x2="160" y2="100"/>
  </g>

  <rect class="frame" x="0" y="0" width="160" height="100"/>

  <rect class="platform" x="0" y="31.25" width="16" height="37.5"/>
  <rect class="platform" x="24" y="12.5" width="104" height="74.375"/>
  <rect class="platform" x="136" y="25" width="24" height="48.888976"/>
  <circle class="sphere" cx="54.967105" cy="51.164887" r="3.113571"/>

  <rect class="gap" x="16" y="0" width="8" height="100"/>
  <rect class="gap" x="128" y="0" width="8" height="100"/>
  <line class="dim" x1="128" y1="90" x2="136" y2="90"/>
  <text class="note" x="128.5" y="96">gap 8</text>

  <text class="label" x="1.4" y="50">A</text>
  <text class="small" x="1.4" y="56">16 x 37.5</text>
  <text class="small" x="1.4" y="61">X0 Z31.25</text>

  <text class="label" x="60" y="47">B</text>
  <text class="small" x="54" y="53">104 x 74.375</text>
  <text class="small" x="54" y="58">X24 Z12.5</text>
  <text class="note" x="49" y="64">new width: 104, old was 96</text>
  <text class="note" x="58.6" y="50.6">sphere r3.114</text>
  <text class="small" x="58.6" y="55.2">X54.967 Z51.165</text>

  <text class="label" x="144" y="47">C</text>
  <text class="small" x="139" y="53">24 x 48.889</text>
  <text class="small" x="139" y="58">X136 Z25</text>

  <line class="axis" x1="0" y1="108" x2="36" y2="108"/>
  <text class="small" x="38" y="109.2">+X</text>
  <line class="axis" x1="-8" y1="0" x2="-8" y2="30"/>
  <text class="small" x="-12" y="35">+Z</text>

  <text class="small" x="0" y="-1.8">(0,0)</text>
  <text class="small" x="146" y="-1.8">(160,0)</text>
  <text class="small" x="142" y="106">(160,100)</text>
</svg>
