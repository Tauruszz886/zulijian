<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="860" viewBox="0 0 1200 860">
  <defs>
    <style>
      .title { font: 700 24px sans-serif; fill: #172033; }
      .label { font: 600 15px sans-serif; fill: #172033; }
      .small { font: 12px sans-serif; fill: #334155; }
      .tiny { font: 11px sans-serif; fill: #475569; }
      .frame { fill: #f8fafc; stroke: #0f172a; stroke-width: 2; }
      .stable { fill: #e2e8f0; stroke: #334155; stroke-width: 1.2; }
      .g1 { fill: #fecaca; stroke: #dc2626; stroke-width: 2; }
      .g2 { fill: #fed7aa; stroke: #ea580c; stroke-width: 2; }
      .g3 { fill: #bfdbfe; stroke: #2563eb; stroke-width: 2; }
      .g4 { fill: #bbf7d0; stroke: #16a34a; stroke-width: 2; }
      .bar-solid { fill: #2563eb; }
      .bar-fade { fill: #93c5fd; }
      .bar-hidden { fill: #cbd5e1; }
      .bar-recover { fill: #22c55e; }
      .axis { stroke: #64748b; stroke-width: 1; }
      .dash { stroke: #94a3b8; stroke-width: 1; stroke-dasharray: 4 4; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="860" fill="#ffffff"/>
  <text x="50" y="38" class="title">第三关机关分组分析：2~13 平台按横排分组，组内顺序错开</text>

  <!-- Plan view: scale 5.5 px per meter, frame 160x100 -->
  <g transform="translate(50,70)">
    <text x="0" y="-18" class="label">平面编号与分组</text>
    <rect x="0" y="0" width="880" height="550" class="frame"/>

    <!-- Stable pieces 1, 14, 15 -->
    <rect x="0" y="171.875" width="88" height="206.25" class="stable"/>
    <text x="44" y="282" text-anchor="middle" class="label">1</text>
    <rect x="682" y="240.625" width="66" height="68.75" class="stable"/>
    <text x="715" y="281" text-anchor="middle" class="label">14</text>
    <rect x="748" y="137.5" width="132" height="275" class="stable"/>
    <text x="814" y="281" text-anchor="middle" class="label">15</text>

    <!-- Group G4: 2,6,10 -->
    <rect x="154" y="34.375" width="132" height="94.53125" class="g4"/>
    <rect x="330" y="34.375" width="132" height="94.53125" class="g4"/>
    <rect x="506" y="34.375" width="132" height="94.53125" class="g4"/>
    <text x="220" y="88" text-anchor="middle" class="label">2</text>
    <text x="396" y="88" text-anchor="middle" class="label">6</text>
    <text x="572" y="88" text-anchor="middle" class="label">10</text>

    <!-- Group G3: 3,7,11 -->
    <rect x="154" y="163.28125" width="132" height="94.53125" class="g3"/>
    <rect x="330" y="163.28125" width="132" height="94.53125" class="g3"/>
    <rect x="517" y="163.28125" width="110" height="94.53125" class="g3"/>
    <text x="220" y="217" text-anchor="middle" class="label">3</text>
    <text x="396" y="217" text-anchor="middle" class="label">7</text>
    <text x="572" y="217" text-anchor="middle" class="label">11</text>
    <text x="650" y="198" class="tiny">11 / ID 1032584478</text>
    <text x="650" y="214" class="tiny">QR_第03关_dxf_84C_24x17_1875</text>

    <!-- Group G2: 4,8,12 -->
    <rect x="154" y="292.1875" width="132" height="94.53125" class="g2"/>
    <rect x="330" y="292.1875" width="132" height="94.53125" class="g2"/>
    <rect x="506" y="292.1875" width="132" height="94.53125" class="g2"/>
    <text x="220" y="346" text-anchor="middle" class="label">4</text>
    <text x="396" y="346" text-anchor="middle" class="label">8</text>
    <text x="572" y="346" text-anchor="middle" class="label">12</text>

    <!-- Group G1: 5,9,13 -->
    <rect x="154" y="421.09375" width="132" height="94.53125" class="g1"/>
    <rect x="330" y="421.09375" width="132" height="94.53125" class="g1"/>
    <rect x="506" y="421.09375" width="132" height="94.53125" class="g1"/>
    <text x="220" y="475" text-anchor="middle" class="label">5</text>
    <text x="396" y="475" text-anchor="middle" class="label">9</text>
    <text x="572" y="475" text-anchor="middle" class="label">13</text>

    <text x="910" y="42" class="label">分组</text>
    <rect x="910" y="60" width="24" height="18" class="g1"/><text x="944" y="74" class="small">G1: 5 -> 9 -> 13</text>
    <rect x="910" y="90" width="24" height="18" class="g2"/><text x="944" y="104" class="small">G2: 4 -> 8 -> 12</text>
    <rect x="910" y="120" width="24" height="18" class="g3"/><text x="944" y="134" class="small">G3: 3 -> 7 -> 11</text>
    <rect x="910" y="150" width="24" height="18" class="g4"/><text x="944" y="164" class="small">G4: 2 -> 6 -> 10</text>
    <rect x="910" y="180" width="24" height="18" class="stable"/><text x="944" y="194" class="small">稳定平台: 1,14,15</text>
    <text x="910" y="235" class="small">每组内按箭头顺序错开。</text>
    <text x="910" y="255" class="small">玩家踩到正在虚幻/消失的平台会掉落。</text>
  </g>

  <!-- Timeline -->
  <g transform="translate(50,660)">
    <text x="0" y="-18" class="label">时间错开示意（建议：组内每个平台相差 2 秒）</text>
    <line x1="150" y1="0" x2="1070" y2="0" class="axis"/>
    <g class="tiny">
      <text x="150" y="-8" text-anchor="middle">0s</text>
      <text x="250" y="-8" text-anchor="middle">2s</text>
      <text x="325" y="-8" text-anchor="middle">3.5s</text>
      <text x="425" y="-8" text-anchor="middle">5.5s</text>
      <text x="500" y="-8" text-anchor="middle">7s</text>
      <text x="600" y="-8" text-anchor="middle">9s</text>
      <text x="700" y="-8" text-anchor="middle">11s</text>
    </g>
    <line x1="150" y1="0" x2="150" y2="160" class="dash"/>
    <line x1="250" y1="0" x2="250" y2="160" class="dash"/>
    <line x1="350" y1="0" x2="350" y2="160" class="dash"/>
    <line x1="450" y1="0" x2="450" y2="160" class="dash"/>
    <line x1="550" y1="0" x2="550" y2="160" class="dash"/>
    <line x1="650" y1="0" x2="650" y2="160" class="dash"/>
    <line x1="750" y1="0" x2="750" y2="160" class="dash"/>

    <!-- Legend -->
    <rect x="760" y="-32" width="45" height="12" class="bar-solid"/><text x="812" y="-22" class="tiny">显示2秒</text>
    <rect x="875" y="-32" width="34" height="12" class="bar-fade"/><text x="916" y="-22" class="tiny">渐隐</text>
    <rect x="975" y="-32" width="45" height="12" class="bar-hidden"/><text x="1027" y="-22" class="tiny">隐藏2秒</text>
    <rect x="1085" y="-32" width="18" height="12" class="bar-recover"/><text x="1110" y="-22" class="tiny">恢复</text>

    <!-- helper: 1s = 50 px, solid 100, fade 75, hidden 100, recover 20 -->
    <text x="0" y="35" class="label">G1: 5 -> 9 -> 13</text>
    <text x="150" y="20" class="tiny">5</text><rect x="150" y="24" width="100" height="16" class="bar-solid"/><rect x="250" y="24" width="75" height="16" class="bar-fade"/><rect x="325" y="24" width="100" height="16" class="bar-hidden"/><rect x="425" y="24" width="20" height="16" class="bar-recover"/>
    <text x="250" y="43" class="tiny">9</text><rect x="250" y="47" width="100" height="16" class="bar-solid"/><rect x="350" y="47" width="75" height="16" class="bar-fade"/><rect x="425" y="47" width="100" height="16" class="bar-hidden"/><rect x="525" y="47" width="20" height="16" class="bar-recover"/>
    <text x="350" y="66" class="tiny">13</text><rect x="350" y="70" width="100" height="16" class="bar-solid"/><rect x="450" y="70" width="75" height="16" class="bar-fade"/><rect x="525" y="70" width="100" height="16" class="bar-hidden"/><rect x="625" y="70" width="20" height="16" class="bar-recover"/>

    <text x="0" y="112" class="label">G2/G3/G4 同理</text>
    <text x="150" y="108" class="small">G2: 4 -> 8 -> 12</text>
    <text x="150" y="130" class="small">G3: 3 -> 7 -> 11</text>
    <text x="150" y="152" class="small">G4: 2 -> 6 -> 10</text>
    <text x="360" y="112" class="small">每一组都采用同样的 0s / +2s / +4s 错开节奏。</text>
    <text x="360" y="134" class="small">如果希望四组之间也错开，可以再给 G1/G2/G3/G4 增加组间偏移。</text>
  </g>
</svg>
