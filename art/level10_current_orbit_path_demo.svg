<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#e53935"/>
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#fb8c00"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#fdd835"/>
    </marker>
    <style>
      text { font-family: Arial, "Microsoft YaHei", sans-serif; fill: #202124; }
      .title { font-size: 26px; font-weight: 700; }
      .note { font-size: 18px; }
      .small { font-size: 15px; fill: #4b5563; }
      .axis { font-size: 13px; fill: #667085; }
      .platform-label { font-size: 20px; font-weight: 700; fill: #1f3b57; }
    </style>
  </defs>

  <rect width="1400" height="900" fill="#f7f5ef"/>
  <text x="70" y="45" class="title">第10关中间平台电流圆周运动路径示意</text>
  <text x="70" y="78" class="note">中间平台尺寸: X=115, Z=20。矩形一周 = 2 x (115 + 20) = 270。4秒一圈 => 速度 = 67.5 m/s。</text>

  <!-- Drawing scale: 8 px = 1 editor meter. Platform world range: X -711..-596, Z -46..-26. -->
  <g transform="translate(230 210)">
    <rect x="0" y="0" width="920" height="160" fill="#b7d7f0" stroke="#2f557f" stroke-width="4"/>
    <text x="365" y="88" class="platform-label">中间平台 115 x 20</text>

    <!-- Orbit lanes. Same logical path, visually offset outward for readability. -->
    <rect x="-18" y="-18" width="956" height="196" fill="none" stroke="#e53935" stroke-width="6" rx="0"
          stroke-dasharray="18 10" marker-end="url(#arrow-red)"/>
    <rect x="-35" y="-35" width="990" height="230" fill="none" stroke="#fb8c00" stroke-width="6" rx="0"
          stroke-dasharray="18 10" marker-end="url(#arrow-orange)"/>
    <rect x="-52" y="-52" width="1024" height="264" fill="none" stroke="#fdd835" stroke-width="6" rx="0"
          stroke-dasharray="18 10" marker-end="url(#arrow-yellow)"/>

    <!-- Direction arrows on each side. -->
    <path d="M70 -18 H300" stroke="#e53935" stroke-width="5" fill="none" marker-end="url(#arrow-red)"/>
    <path d="M938 25 V105" stroke="#e53935" stroke-width="5" fill="none" marker-end="url(#arrow-red)"/>
    <path d="M850 178 H620" stroke="#e53935" stroke-width="5" fill="none" marker-end="url(#arrow-red)"/>
    <path d="M-18 135 V55" stroke="#e53935" stroke-width="5" fill="none" marker-end="url(#arrow-red)"/>

    <!-- Dimensions. -->
    <line x1="0" y1="230" x2="920" y2="230" stroke="#344054" stroke-width="2"/>
    <line x1="0" y1="220" x2="0" y2="240" stroke="#344054" stroke-width="2"/>
    <line x1="920" y1="220" x2="920" y2="240" stroke="#344054" stroke-width="2"/>
    <text x="420" y="260" class="note">长边 115m</text>

    <line x1="1010" y1="0" x2="1010" y2="160" stroke="#344054" stroke-width="2"/>
    <line x1="1000" y1="0" x2="1020" y2="0" stroke="#344054" stroke-width="2"/>
    <line x1="1000" y1="160" x2="1020" y2="160" stroke="#344054" stroke-width="2"/>
    <text x="1030" y="88" class="note">短边 20m</text>

    <!-- World coordinate labels. -->
    <text x="0" y="-82" class="axis">平台左边 X=-711</text>
    <text x="760" y="-82" class="axis">平台右边 X=-596</text>
    <text x="1040" y="8" class="axis">Z=-46</text>
    <text x="1040" y="166" class="axis">Z=-26</text>

    <text x="-50" y="-120" class="small">红: 第1道电流 Y=6.5</text>
    <text x="230" y="-120" class="small">橙: 第2道电流 Y=7.5</text>
    <text x="510" y="-120" class="small">黄: 第3道电流 Y=8.5</text>
  </g>

  <g transform="translate(70 675)">
    <rect x="0" y="0" width="1260" height="145" fill="#ffffff" stroke="#d0d5dd" stroke-width="2" rx="8"/>
    <text x="24" y="36" class="note">运动路径逻辑</text>
    <text x="24" y="70" class="small">1. 把中间平台当成俯视平面矩形，电流沿平台边界循环运动。</text>
    <text x="24" y="98" class="small">2. 一圈长度 270m，4秒跑完，所以每道电流的线速度是 67.5m/s。</text>
    <text x="24" y="126" class="small">3. 三道电流在俯视图共用同一圈路径，实际高度分三层: Y=6.5、7.5、8.5。</text>
  </g>
</svg>
